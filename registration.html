<h2 align="center">Customer Registration Form</h2>
<form>
    <label><b>NAME &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp  &nbsp:</b></label>
    <input type="text"
     placeholder="enter your name" required>
    <br><br>
    <label><b>EMAIL  &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp  &nbsp:</b></label>
    <input type="email"
     placeholder="abc@gmail.com" required>
     <br><br>
     <label><b>PASSWORD &nbsp &nbsp :</b></label>
    <input type="password" placeholder="Create Password" required>
    <br><br>
    <label><b>PH NO  &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp:</b></label>
    <input type="tel"
     placeholder="9XXXXXXXXX" required>
    <br><br>
    <input type="checkbox" required>
        I agree to the Terms and Conditions
        <br><br>
      <input type="submit" value="Register">
        <input type="reset" value="Clear">
 </form>
 <hr>
     <p align="center">
        Already have an account?
